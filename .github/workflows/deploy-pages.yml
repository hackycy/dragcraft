name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Build docs
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/
        run: pnpm docs:build

      - name: Build playground
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/playground/
        run: pnpm -F ./playground build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/playground
          cp -R docs/.vitepress/dist/. _site/
          cp -R playground/dist/. _site/playground/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
